---
name: Go Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26.4

    - name: Test
      run:  go test -v -tags=release -cover ./...

    - name: Lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
